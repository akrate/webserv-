<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>500 Internal Server Error</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		body {
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 20px;
		}
		.container {
			background: white;
			border-radius: 10px;
			box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
			padding: 60px 40px;
			text-align: center;
			max-width: 500px;
		}
		h1 {
			font-size: 72px;
			color: #d32f2f;
			margin-bottom: 10px;
		}
		h2 {
			color: #333;
			font-size: 24px;
			margin-bottom: 20px;
		}
		p {
			color: #666;
			line-height: 1.6;
			margin-bottom: 30px;
		}
		a {
			display: inline-block;
			padding: 12px 30px;
			background: #667eea;
			color: white;
			text-decoration: none;
			border-radius: 5px;
			transition: background 0.3s;
		}
		a:hover {
			background: #764ba2;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>500</h1>
		<h2>Internal Server Error</h2>
		<p>An unexpected error occurred while processing your request. Please try again later.</p>
		<a href="/">← Go to Home</a>
	</div>
</body>
</html>
