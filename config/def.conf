server {
    listen 8080;
    host 127.0.0.1;
    server_name example.com;

    error_page 404 /errors/404.html;
    client_max_body_size 2k;

    # =========================
    # 1. STATIC FILES (READ ONLY)
    # =========================
    location / {
        root ./www/html;
        index index.html;
        methods GET;
        autoindex on;
    }

    location /assets/css {
        root ./www/html;
        methods GET;
    }

    # =========================
    # 2. UPLOADS (READ / WRITE / DELETE)
    # =========================
    location /uploads {
        root ./www/html;
        methods GET POST DELETE;
        allow_upload on;
        upload_store ./www/html/uploads;
    }

    # =========================
    # 3. CGI
    # =========================
    location /cgi-bin {
        root ./www/cgi-bin;
        methods GET POST;
        cgi_ext .py;
        cgi_path /usr/bin/python3;
    }

    # =========================
    # 4. REDIRECT
    # =========================
    location /old-page {
        return 301 /new-page;
    }
}



