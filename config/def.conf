server {
    listen 8080;                        
    host 127.0.0.1;                   
    server_name example.com;          
    error_page 404 /errors/404.html;    
    client_max_body_size 10M;           
    
    location / {
        root ./www/html;            
        index index.html;              
        methods GET POST;            
        autoindex on;                  
    }
    location                           /uploads                 {
        methods POST GET DELETE;
        root ./www/uploads;
        allow_upload on;                
        upload_store ./www/uploads;
    }
    
    location /cgi-bin {
        methods GET POST;
        root ./www/cgi-bin;
        cgi_ext .py;                   
        cgi_path /usr/bin/python3;     
    }

    location /old-page {
        return 301 /new-page;
    }
}

