<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <title>404 — Page Not Found</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Jost', sans-serif;
      background: #1a1008;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .code {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(80px, 20vw, 160px);
      font-weight: 300;
      color: #fce38a;
      letter-spacing: 0.1em;
      line-height: 1;
    }
    .title { font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin: 16px 0 32px; }
    .message { font-size: 15px; color: rgba(255,255,255,0.35); max-width: 360px; line-height: 1.7; margin-bottom: 40px; }
    .btn {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #1a1008;
      background: #fce38a;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .btn:hover { background: #f5d060; }
  </style>
</head>
<body>
  <p class="code">404</p>
  <p class="title">Page not found</p>
  <p class="message">The page you're looking for has drifted off into the dunes. Let's get you back on track.</p>
  <a href="/index.html" class="btn">Back to home</a>
</body>
</html>
