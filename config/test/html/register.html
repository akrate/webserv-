<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <title>Register — Fusion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: #f4f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #fff;
      border: 1px solid #e0e0d8;
      border-radius: 14px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }
    .brand { font-family: 'DM Serif Display', serif; font-size: 26px; color: #1a1a18; margin-bottom: 4px; }
    .brand-sub { font-size: 13px; color: #6b6b65; margin-bottom: 2rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 11px; font-weight: 500; color: #6b6b65; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 10px 14px;
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      background: #f8f8f5; border: 1px solid #d8d8d0;
      border-radius: 8px; color: #1a1a18; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input:focus { border-color: #3B6D11; box-shadow: 0 0 0 3px rgba(59,109,17,0.12); background: #fff; }
    .btn {
      width: 100%; padding: 11px;
      background: #3B6D11; color: #EAF3DE;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
      border: none; border-radius: 8px; cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #27500A; }
    .divider { display: flex; align-items: center; gap: 10px; margin: 1.25rem 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e8e8e0; }
    .divider span { font-size: 12px; color: #b0b0a8; }
    .footer-txt { font-size: 13px; color: #6b6b65; text-align: center; }
    .footer-txt a { color: #3B6D11; text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <p class="brand">Fusion</p>
    <p class="brand-sub">Create your account</p>
    <form action="/cgi-bin/register.py" method="post">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Choose a username" required autocomplete="username">
      </div>
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password" required autocomplete="new-password">
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" name="confirm" placeholder="Repeat your password" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn" style="margin-top: 8px;">Create account</button>
    </form>
    <div class="divider"><span>or</span></div>
    <p class="footer-txt">Already have an account? <a href="/cgi-bin/acc.py">Sign in</a></p>
  </div>
</body>
</html>
