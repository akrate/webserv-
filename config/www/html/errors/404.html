<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>400 Bad Request</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.04); }
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: url(../bg.png);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      padding: 2rem 1.25rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.52);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 480px;
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      animation: fadeSlideUp 0.6s cubic-bezier(.22,.68,0,1.2) both;
    }

    .code {
    pointer-events: none;
    user-select: none;

    font-size: clamp(90px, 20vw, 140px);
    font-weight: 700;
    line-height: 1;
    color: #ff6b6b;
    letter-spacing: -5px;
    margin-bottom: 8px;
    animation: pulse 3.2s ease-in-out 0.7s infinite;
    text-shadow: 0 0 40px rgba(255, 107, 107, 0.4);
    }
    .divider {
      width: 48px;
      height: 3px;
      background: #ff6b6b;
      border-radius: 2px;
      margin: 0 auto 22px;
      opacity: 0.7;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .desc {
      font-size: 15px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.75);
      margin-bottom: 34px;
    }

    .btn {
      display: inline-block;
      padding: 11px 34px;
      background: #ff6b6b;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.4px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.18s, transform 0.12s;
    }
    .btn:hover  { background: #e05555; transform: translateY(-2px); }
    .btn:active { background: #c94444; transform: scale(0.97); }

    footer {
      margin-top: 40px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.2px;
    }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">400</div>
    <div class="divider"></div>
    <h1 class="title">Bad Request</h1>
    <p class="desc">
      The server could not understand your request.<br>
      Please check the URL or your input and try again.
    </p>
    <button class="btn" onclick="history.back()">&#8592; Go Back</button>
    <footer>HTTP 400 &nbsp;&middot;&nbsp; Bad Request</footer>
  </div>
</body>
</html>
